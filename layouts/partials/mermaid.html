{{ if .Store.Get "hasMermaid" }}
<style>
  .mermaid { cursor: pointer; display: inline-block; }
  .mermaid .cluster-label text { font-weight: bold; font-size: 15px; }
  dialog.mermaid-lightbox {
    max-width: 90vw;
    max-height: 90vh;
    overflow: auto;
    padding: 1.5rem;
    border: none;
    border-radius: 0.5rem;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  }
  dialog.mermaid-lightbox::backdrop { background: rgba(0,0,0,0.5); }
  dialog.mermaid-lightbox svg { width: 100%; height: auto; display: block; }
</style>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'neutral', flowchart: { htmlLabels: false } });
  await mermaid.run();

  document.querySelectorAll('.mermaid').forEach(el => {
    const svg = el.querySelector('svg');
    if (!svg) return;

    const w = parseFloat(svg.getAttribute('width'));
    const h = parseFloat(svg.getAttribute('height'));
    if (w && h) {
      svg.setAttribute('width', w / 2);
      svg.setAttribute('height', h / 2);
    }

    const dialog = document.createElement('dialog');
    dialog.className = 'mermaid-lightbox';
    document.body.appendChild(dialog);
    dialog.addEventListener('click', () => dialog.close());

    el.addEventListener('click', () => {
      dialog.innerHTML = '';
      const clone = svg.cloneNode(true);
      if (w && h) {
        clone.setAttribute('width', w);
        clone.setAttribute('height', h);
      }
      dialog.appendChild(clone);
      dialog.showModal();
    });
  });
</script>
{{ end }}
