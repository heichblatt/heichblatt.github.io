{{ if .Store.Get "hasMermaid" }}
<style>
  .mermaid { overflow-x: auto; }
  .mermaid svg { min-width: 900px; width: 100%; height: auto; }
  .mermaid .cluster-label text { font-weight: bold; font-size: 15px; }
</style>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: true,
    theme: 'neutral',
    flowchart: { htmlLabels: false }
  });
</script>
{{ end }}
